  <circle cx="60" cy="18" r="6" fill="#f9e2af"/>
  <text x="400" y="22" font-family="monospace" font-size="12" fill="#cdd6f4" text-anchor="middle">terminal — multi-step agent reasoning</text>
  <text x="20" y="62" font-family="monospace" font-size="12" fill="#6c7086">─────────────────────────────────────────────────────────</text>
  <text x="20" y="82" font-family="monospace" font-size="12" fill="#f9e2af">📋 Task: Search Wikipedia for LLMs and save summary to llm_summary.txt</text>
  <text x="20" y="102" font-family="monospace" font-size="12" fill="#6c7086">─────────────────────────────────────────────────────────</text>
  <text x="20" y="128" font-family="monospace" font-size="12" fill="#cba6f7">Thought: <tspan fill="#cdd6f4">I need to search Wikipedia, then save the summary.</tspan></text>
  <text x="20" y="150" font-family="monospace" font-size="12" fill="#cba6f7">Action: <tspan fill="#89b4fa">wikipedia</tspan></text>
  <text x="20" y="172" font-family="monospace" font-size="12" fill="#cba6f7">Input: <tspan fill="#cdd6f4">Large Language Models</tspan></text>
  <text x="20" y="197" font-family="monospace" font-size="12" fill="#a6e3a1">Observation: <tspan fill="#cdd6f4">Large language models (LLMs) are neural networks trained on massive</tspan></text>
  <text x="20" y="215" font-family="monospace" font-size="12" fill="#cdd6f4">             text datasets. They use transformer architecture to generate text.</text>
  <text x="20" y="233" font-family="monospace" font-size="12" fill="#cdd6f4">             Examples include GPT-4, Claude, Gemini, and LLaMA...</text>
  <text x="20" y="258" font-family="monospace" font-size="12" fill="#cba6f7">Thought: <tspan fill="#cdd6f4">Now I have the info. Let me write it to the file.</tspan></text>
  <text x="20" y="278" font-family="monospace" font-size="12" fill="#cba6f7">Action: <tspan fill="#89b4fa">file_write</tspan></text>
  <text x="20" y="298" font-family="monospace" font-size="12" fill="#cba6f7">Input: <tspan fill="#cdd6f4">llm_summary.txt|LLM Summary: Large language models are neural nets...</tspan></text>
  <text x="20" y="323" font-family="monospace" font-size="12" fill="#a6e3a1">Observation: <tspan fill="#cdd6f4">✅ Saved to workspace/llm_summary.txt (298 chars)</tspan></text>
  <text x="20" y="348" font-family="monospace" font-size="12" fill="#cba6f7">Final Answer: <tspan fill="#cdd6f4">Done! LLM summary saved to workspace/llm_summary.txt</tspan></text>
  <text x="20" y="383" font-family="monospace" font-size="12" fill="#a6e3a1">✅ Result: <tspan fill="#cdd6f4">Done! LLM summary saved to workspace/llm_summary.txt</tspan></text>
