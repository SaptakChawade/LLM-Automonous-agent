<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" rx="12" fill="#1e1e2e"/>
  <rect width="800" height="36" rx="12" fill="#313244"/>
